<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="display-section">
                <input type="text" id="display" class="display" placeholder="0" readonly>
                <div class="history-panel">
                    <h4>📋 History</h4>
                    <div id="history" class="history-list"></div>
                </div>
            </div>

            <div class="buttons-section">
                <!-- First Row: Basic Operations -->
                <div class="button-row">
                    <button class="btn clear-btn" onclick="clearDisplay()">C</button>
                    <button class="btn delete-btn" onclick="deleteLast()">⌫</button>
                    <button class="btn operator-btn" onclick="appendOperator('/')">÷</button>
                    <button class="btn operator-btn" onclick="appendOperator('*')">×</button>
                </div>

                <!-- Second Row: Numbers 7-9 and Subtract -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('7')">7</button>
                    <button class="btn number-btn" onclick="appendNumber('8')">8</button>
                    <button class="btn number-btn" onclick="appendNumber('9')">9</button>
                    <button class="btn operator-btn" onclick="appendOperator('-')">−</button>
                </div>

                <!-- Third Row: Numbers 4-6 and Add -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('4')">4</button>
                    <button class="btn number-btn" onclick="appendNumber('5')">5</button>
                    <button class="btn number-btn" onclick="appendNumber('6')">6</button>
                    <button class="btn operator-btn" onclick="appendOperator('+')">+</button>
                </div>

                <!-- Fourth Row: Numbers 1-3 and Equal -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('1')">1</button>
                    <button class="btn number-btn" onclick="appendNumber('2')">2</button>
                    <button class="btn number-btn" onclick="appendNumber('3')">3</button>
                    <button class="btn equals-btn" onclick="calculate()" style="grid-row: span 2;">✓</button>
                </div>

                <!-- Fifth Row: Zero and Decimal -->
                <div class="button-row">
                    <button class="btn number-btn" onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
                    <button class="btn number-btn" onclick="appendNumber('.')">.</button>
                </div>

                <!-- Scientific Operations -->
                <div class="button-row scientific">
                    <button class="btn sci-btn" onclick="scientificOp('sqrt')">√</button>
                    <button class="btn sci-btn" onclick="scientificOp('pow')">x^y</button>
                    <button class="btn sci-btn" onclick="scientificOp('mod')">mod</button>
                    <button class="btn sci-btn" onclick="scientificOp('log')">log</button>
                </div>

                <!-- Trigonometric Operations -->
                <div class="button-row scientific">
                    <button class="btn sci-btn" onclick="scientificOp('sin')">sin</button>
                    <button class="btn sci-btn" onclick="scientificOp('cos')">cos</button>
                    <button class="btn sci-btn" onclick="scientificOp('tan')">tan</button>
                    <button class="btn sci-btn" onclick="scientificOp('fact')">x!</button>
                </div>

                <!-- Special Operations -->
                <div class="button-row scientific">
                    <button class="btn sci-btn" onclick="scientificOp('pi')">π</button>
                    <button class="btn sci-btn" onclick="scientificOp('e')">e</button>
                    <button class="btn sci-btn" onclick="toggleSign()">+/−</button>
                    <button class="btn sci-btn" onclick="scientificOp('1/x')">1/x</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
